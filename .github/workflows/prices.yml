name: aktier-priser

on:
  schedule:
    # Vardagar var 5:e minut under börsens öppettider (SE 09:00–17:30).
    # OBS: GitHub-cron är UTC och hanterar inte sommartid. Fönstret 07–16 UTC
    # täcker svensk 09:00–17:30 både vinter (UTC+1) och sommar (UTC+2).
    - cron: '*/5 7-16 * * 1-5'
    # Helger: en gång per dag ~09:00 svensk tid (07:00 UTC).
    - cron: '5 7 * * 6,0'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Hämta ~1 års historik (annars bara senaste kurser)'
        type: boolean
        default: false

concurrency:
  group: aktier-priser
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r prices/requirements.txt
      - name: Hämta kurser
        run: python prices/fetch_prices.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKFILL: ${{ github.event.inputs.backfill }}
