name: aktier-priser

on:
  # Schemaläggning sker externt: cron-job.org anropar workflow_dispatch var 5:e
  # minut under börstid (GitHubs inbyggda schedule var för opålitlig).
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Hämta ~1 års historik (annars bara senaste kurser)'
        type: boolean
        default: false

concurrency:
  group: aktier-priser
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r prices/requirements.txt
      - name: Hämta kurser
        run: python prices/fetch_prices.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKFILL: ${{ github.event.inputs.backfill }}
